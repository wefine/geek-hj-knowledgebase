# RSS 数据源配置
# 用于 pipeline.py 自动采集 AI 技术内容

sources:
  # --- 综合技术 ---
  - name: "Hacker News (Best)"
    url: "https://hnrss.org/best?q=AI+OR+LLM+OR+agent"
    category: "general"
    enabled: true

  - name: "Reddit r/MachineLearning"
    url: "https://www.reddit.com/r/MachineLearning/hot.rss"
    category: "research"
    enabled: true

  - name: "Reddit r/LocalLLaMA"
    url: "https://www.reddit.com/r/LocalLLaMA/hot.rss"
    category: "open-source"
    enabled: true

  # --- AI 研究 ---
  - name: "arXiv cs.AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
    category: "research"
    enabled: true

  - name: "arXiv cs.CL"
    url: "https://rss.arxiv.org/rss/cs.CL"
    category: "research"
    enabled: false  # 量太大，按需开启

  # --- 公司博客 ---
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    category: "industry"
    enabled: true

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/research/rss.xml"
    category: "industry"
    enabled: true

  - name: "Google AI Blog"
    url: "https://blog.google/technology/ai/rss/"
    category: "industry"
    enabled: true

  # --- 开发者社区 ---
  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    category: "open-source"
    enabled: true

  - name: "LangChain Blog"
    url: "https://blog.langchain.dev/rss/"
    category: "framework"
    enabled: true

  # --- 中文社区 ---
  - name: "机器之心"
    url: "https://www.jiqizhixin.com/rss"
    category: "chinese"
    enabled: false  # 需确认 RSS 可用性

  - name: "量子位"
    url: "https://www.qbitai.com/feed"
    category: "chinese"
    enabled: false  # 需确认 RSS 可用性
